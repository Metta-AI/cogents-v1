services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cogent
      POSTGRES_USER: cogent
      POSTGRES_PASSWORD: cogent_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cogent"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
