# System bootstrap configuration for a cogent's task execution system.
# Loaded via: cogent <name> brain bootstrap

# Cron schedules
cron:
  - cron_expression: "*/10 * * * * *"  # Every 10 seconds
    event_pattern: "scheduler:tick"

# Triggers: wire events to programs
triggers:
  - program_name: pick-task-to-run
    event_pattern: "scheduler:tick"
    priority: 1

  - program_name: run-task
    event_pattern: "task:dispatch"
    priority: 1

  - program_name: verify-completion
    event_pattern: "run:succeeded"
    priority: 1

  - program_name: handle-run-failure
    event_pattern: "run:failed"
    priority: 1

# Resources: pool and consumable limits
resources:
  - name: concurrent-tasks
    resource_type: pool
    capacity: 3

  - name: ecs
    resource_type: pool
    capacity: 2

  - name: lambda
    resource_type: pool
    capacity: 5

# Memory: system configuration
memory:
  - name: "/vsm/s1/task-priority-temperature"
    content: "1.0"
