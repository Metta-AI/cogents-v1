name: Build Dashboard Image

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "src/dashboard/**"
      - "pyproject.toml"
      - ".github/workflows/docker-build-dashboard.yml"
      - ".github/actions/ecr-build/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.build.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Build and push dashboard image
        id: build
        uses: ./.github/actions/ecr-build
        with:
          image_name: cogent-dashboard
          dockerfile: dashboard/Dockerfile
          context: .
          aws_role: ${{ vars.AWS_ROLE }}
          aws_region: us-east-1

      - name: Summary
        run: |
          echo "### Dashboard Built" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`cogent-dashboard:${{ steps.build.outputs.short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Deploy:** \`cogent <name> update dashboard --sha ${{ steps.build.outputs.short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  update-versions:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate CI app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Update versions defaults
        uses: ./.github/actions/update-versions
        with:
          component: dashboard
          version: ${{ needs.build.outputs.short_sha }}
          token: ${{ steps.app-token.outputs.token }}
