name: Validate CloudFormation Template

on:
  pull_request:
    paths:
      - 'src/body/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install dependencies
        run: nix develop -c uv sync --frozen

      - name: Validate CloudFormation template
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          nix develop -c python -c "
          import json
          from body.cfn.template import build_template

          template = build_template('test')
          assert isinstance(template, dict), f'Expected dict, got {type(template)}'
          template_json = json.dumps(template)
          assert 'Resources' in template, 'Missing Resources key'
          print(f'CloudFormation template is valid ({len(template_json)} bytes, {len(template[\"Resources\"])} resources)')
          "
